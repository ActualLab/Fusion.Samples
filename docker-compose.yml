services:
  db:
    image: "postgres"
    environment:
      POSTGRES_PASSWORD: "postgres"
      POSTGRES_USER: "postgres"
      POSTGRES_HOST_AUTH_METHOD: "password"
    ports:
      - "5432:5432"
    expose:
      - "5432"
    entrypoint: ["docker-entrypoint.sh", "-c", "shared_buffers=256MB", "-c", "max_connections=1000"]

  sample_hello_world:
    build:
      context: .
      target: sample_hello_world

  sample_hello_cart:
    build:
      context: .
      target: sample_hello_cart

  sample_hello_blazor_server:
    build:
      context: .
      target: sample_hello_blazor_server
    ports:
     - "5005:5005"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5005"
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__Console__FormatterName: ""

  sample_hello_blazor_hybrid:
    build:
      context: .
      target: sample_hello_blazor_hybrid
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5005"
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__Console__FormatterName: ""

  sample_blazor:
    build:
      context: .
      target: sample_blazor
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5005"
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__Console__FormatterName: ""

  sample_todoapp:
    build:
      context: .
      target: sample_todoapp
    ports:
      - "5005:5005"
    environment:
      ASPNETCORE_URLS: "http://0.0.0.0:5005"
      ASPNETCORE_ENVIRONMENT: "Development"
      Logging__Console__FormatterName: ""

  sample_blazor_ws:
    build:
      context: .
      target: sample_blazor_ws
    ports:
     - "80:80"
    environment:
      ASPNETCORE_URLS: "http://*:80"
      Server__AssumeHttps: "true"
      Logging__Console__FormatterName: ""

  sample_mini_rpc:
    build:
      context: .
      target: sample_mini_rpc

  sample_multi_server_rpc:
    build:
      context: .
      target: sample_multi_server_rpc

  sample_mesh_rpc:
    build:
      context: .
      target: sample_mesh_rpc

  sample_benchmark:
    build:
      context: .
      target: sample_benchmark
    depends_on:
      - db
    links:
      - db

  sample_rpc_benchmark:
    build:
      context: .
      target: sample_rpc_benchmark
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # The settings below are matching the settings from grpc_bench for 4 cpus:
  # - https://github.com/LesnyRumcajs/grpc_bench
  # - https://github.com/LesnyRumcajs/grpc_bench/discussions/441 (the most recent results I could find)
  # 'SayHello' is the test that matches the grpc_bench payload.
  #
  # CPU pinning (cpuset) keeps the 4-CPU server on a single CCD and the clients on
  # non-overlapping cores, so the server never straddles CCDs or contends with clients.
  # Ranges assume a 16C/32T CPU where the OS enumerates the 16 physical cores as logical
  # 0-15 (CCD0 = 0-7, CCD1 = 8-15) and their SMT siblings as 16-31. Adjust to your topology
  # (verify inside a container with: lscpu -e) and to your WSL2 vCPU count if on Docker Desktop.

  sample_rpc_benchmark_server:
    build:
      context: .
      target: sample_rpc_benchmark
    command: server https://0.0.0.0:443/
    expose:
      - "443"
    cpuset: "0-3"        # 4 physical cores on one CCD (server = the measured 4-core bottleneck)
    deploy:
      resources:
        limits:
          cpus: '4'

  sample_rpc_benchmark_calls:
    build:
      context: .
      target: sample_rpc_benchmark
    depends_on:
      - sample_rpc_benchmark_server
    command: client -b calls -wait -s -n 6 https://sample_rpc_benchmark_server
    cpuset: "8-31"       # 24 logical CPUs, disjoint from the server's 0-3 (4-7 left as a buffer)
    deploy:
      resources:
        limits:
          cpus: '24'

  sample_rpc_benchmark_streams:
    build:
      context: .
      target: sample_rpc_benchmark
    depends_on:
      - sample_rpc_benchmark_server
    command: client -b streams -wait -s -n 6 -l rpc,grpc,signalr,jsonrpc https://sample_rpc_benchmark_server
    cpuset: "8-31"       # 24 logical CPUs, disjoint from the server's 0-3 (4-7 left as a buffer)
    deploy:
      resources:
        limits:
          cpus: '24'
